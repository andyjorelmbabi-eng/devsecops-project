
name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devsecops-app ./app

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
